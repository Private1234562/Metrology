<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Метролог.ПРО — Платформа обучения поверителей</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#060D1A;color:#E2E8F0;min-height:100vh;line-height:1.6;font-size:15px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0B1628}::-webkit-scrollbar-thumb{background:#1E293B;border-radius:3px}

/* layout */
.wrap{max-width:900px;margin:0 auto;padding:24px}
.narrow{max-width:420px;margin:0 auto;padding:32px 20px}
.center{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

/* cards */
.card{background:#0F172A;border:1px solid #1E293B;border-radius:12px;padding:20px}
.card-brand{border-color:rgba(13,148,136,.3);background:rgba(13,148,136,.04)}
.card-success{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.04)}
.card-danger{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.05)}
.card-violet{border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.04)}

/* logo */
.logo{display:flex;align-items:center;gap:8px}
.logo-name{font-size:16px;font-weight:800;letter-spacing:-.3px}
.logo-dot{color:#2DD4BF}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .14s;line-height:1;font-family:inherit;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-lg{padding:13px 24px;font-size:15px}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-full{width:100%}
.btn-p{background:#0D9488;color:#fff}.btn-p:hover:not(:disabled){background:#0F766E}
.btn-g{background:transparent;color:#94A3B8;border:1px solid #1E293B}.btn-g:hover:not(:disabled){background:#1E293B;color:#E2E8F0}
.btn-s{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.25)}.btn-s:hover:not(:disabled){background:rgba(16,185,129,.2)}
.btn-v{background:rgba(139,92,246,.15);color:#A78BFA;border:1px solid rgba(139,92,246,.3)}.btn-v:hover:not(:disabled){background:rgba(139,92,246,.25)}

/* form */
.input{width:100%;padding:10px 14px;background:#0A1525;border:1px solid #1E293B;border-radius:8px;color:#E2E8F0;font-size:14px;outline:none;transition:border .14s;font-family:inherit}
.input:focus{border-color:#0D9488}
.input::placeholder{color:#334155}

/* tabs */
.tabs{display:flex;border:1px solid #1E293B;border-radius:8px;overflow:hidden}
.tab{flex:1;padding:9px;border:none;background:transparent;color:#64748B;font-size:13px;font-weight:600;cursor:pointer;transition:all .14s;font-family:inherit}
.tab.on{background:#0D9488;color:#fff}

/* badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:1px solid transparent}
.b-easy{background:rgba(16,185,129,.1);color:#34D399;border-color:rgba(52,211,153,.2)}
.b-med{background:rgba(245,158,11,.1);color:#FBBF24;border-color:rgba(251,191,36,.2)}
.b-hard{background:rgba(239,68,68,.1);color:#F87171;border-color:rgba(248,113,113,.2)}
.b-type{background:rgba(100,116,139,.1);color:#94A3B8;border-color:rgba(100,116,139,.15)}
.b-nd{background:rgba(139,92,246,.1);color:#A78BFA;border-color:rgba(167,139,250,.2)}

/* progress */
.pbar{height:4px;background:#1E293B;border-radius:4px;overflow:hidden}
.pfill{height:100%;background:#0D9488;border-radius:4px;transition:width .3s}

/* options */
.opt{width:100%;text-align:left;padding:13px 16px;border-radius:8px;border:1px solid #1E293B;background:#0A1525;color:#CBD5E1;cursor:pointer;font-size:14px;display:flex;align-items:flex-start;gap:12px;transition:all .12s;font-family:inherit;line-height:1.55}
.opt:hover{border-color:#0D9488;background:rgba(13,148,136,.07)}
.opt.sel{border-color:#0D9488;background:rgba(13,148,136,.12);color:#fff}
.opt.ok{border-color:#10B981;background:rgba(16,185,129,.1);color:#6EE7B7;cursor:default}
.opt.no{border-color:#EF4444;background:rgba(239,68,68,.08);color:#FCA5A5;cursor:default}
.okey{min-width:26px;height:26px;border-radius:6px;background:#1E293B;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:monospace;flex-shrink:0;color:#94A3B8;margin-top:1px}

/* protocol */
.ptb{width:100%;border-collapse:collapse;font-size:13px}
.ptb td{padding:7px 12px;border-bottom:1px solid #141E32}
.ptb tr:last-child td{border-bottom:none}
.ptb td:first-child{color:#64748B;width:52%}
.ptb td:last-child{font-weight:600}
.ptb tr.err td{background:rgba(180,83,9,.15);color:#FCD34D}
.proto{background:#040B18;border:1px solid #141E32;border-radius:8px;padding:14px}

/* explain */
.explain{background:rgba(13,148,136,.07);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:14px 16px;font-size:13px;color:#99F6E4;line-height:1.65}
.explain b{color:#2DD4BF}
.hintbox{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#FCD34D;display:flex;gap:8px;align-items:flex-start}

/* pipeline */
.pipe{display:flex;align-items:center}
.pnode{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:monospace;flex-shrink:0}
.pnode.done{background:#0D9488;color:#fff}
.pnode.act{border:2px solid #0D9488;color:#2DD4BF}
.pnode.lock{background:#1E293B;color:#334155}
.pline{flex:1;height:2px;background:#1E293B;margin:0 10px;margin-bottom:18px}
.pline.done{background:#0D9488}

/* module cards */
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mcard{background:#0B1628;border:1px solid #1E293B;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:border .2s}
.mcard.act{border-color:rgba(13,148,136,.35);background:rgba(13,148,136,.04)}
.mcard.done{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.03)}
.mcard.lock{opacity:.5}
.mcard.violet{border-color:rgba(139,92,246,.3);background:rgba(139,92,246,.04)}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #1A2744;gap:12px}

/* stats */
.stat{background:#1A2744;border-radius:8px;padding:12px;text-align:center}
.stat-v{font-size:22px;font-weight:800;font-family:monospace}
.stat-l{font-size:11px;color:#475569;margin-top:4px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.score-num{font-size:60px;font-weight:900;font-family:monospace;line-height:1}

/* toast */
#toast{position:fixed;top:18px;right:18px;z-index:9999;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:600;display:none;animation:tin .25s ease}
@keyframes tin{from{transform:translateX(36px);opacity:0}to{transform:none;opacity:1}}
.t-ok{background:#064E3B;color:#6EE7B7;border:1px solid #065F46}
.t-err{background:#7F1D1D;color:#FCA5A5;border:1px solid #991B1B}
.t-info{background:#1E3A5F;color:#93C5FD;border:1px solid #1D4ED8}

/* dots */
.dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;max-width:160px}
.dot{width:9px;height:9px;border-radius:50%;cursor:pointer;transition:background .14s;border:none;padding:0}

/* cert */
.cert{border:2px solid rgba(16,185,129,.4);border-radius:16px;background:#0A1628;padding:40px 36px;text-align:center;position:relative;overflow:hidden}
.cert-wm{position:absolute;font-size:220px;color:rgba(13,148,136,.04);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;user-select:none;line-height:1}

/* review */
.rev{padding:14px;background:#0B1628;border-radius:8px;border:1px solid #1E293B;display:flex;gap:12px;align-items:flex-start}
.rev.ok{border-color:rgba(16,185,129,.25)}
.rev.no{border-color:rgba(239,68,68,.2)}

/* ─── LEARNING MODULE ─────────────────────────────────── */
.learn-grid{display:grid;grid-template-columns:260px 1fr;gap:16px;align-items:start}
.lesson-list{display:flex;flex-direction:column;gap:6px;position:sticky;top:16px}
.lesson-item{padding:11px 14px;border-radius:8px;border:1px solid #1E293B;cursor:pointer;transition:all .14s;display:flex;gap:10px;align-items:flex-start;background:#0B1628}
.lesson-item:hover{border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.06)}
.lesson-item.on{border-color:rgba(139,92,246,.5);background:rgba(139,92,246,.1)}
.lesson-item.done-l{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.03)}
.lesson-num{min-width:22px;height:22px;border-radius:50%;background:#1E293B;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:monospace;flex-shrink:0;color:#64748B}
.lesson-num.done-n{background:#10B981;color:#fff}
.lesson-num.on-n{background:#7C3AED;color:#fff}
.nd-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(139,92,246,.12);color:#A78BFA;border:1px solid rgba(167,139,250,.2);margin-bottom:14px}
.theory{background:#040B18;border:1px solid #141E32;border-radius:10px;padding:18px;margin-bottom:12px;font-size:14px;line-height:1.75;color:#CBD5E1}
.theory h4{font-size:13px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;margin-top:16px}
.theory h4:first-child{margin-top:0}
.theory p{margin-bottom:10px}
.theory p:last-child{margin-bottom:0}
.theory strong{color:#E2E8F0}
.theory em{color:#94A3B8;font-style:normal}
.formula{background:rgba(13,148,136,.08);border:1px solid rgba(13,148,136,.2);border-radius:8px;padding:13px 16px;font-family:monospace;font-size:14px;color:#99F6E4;margin:12px 0}
.ktable{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.ktable th{padding:7px 12px;background:#0D1628;color:#64748B;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #141E32}
.ktable td{padding:8px 12px;border-bottom:1px solid #141E32;color:#CBD5E1}
.ktable td:last-child{font-weight:600;font-family:monospace;color:#E2E8F0}
.ktable tr:last-child td{border-bottom:none}
.case-section{border-top:1px solid #1E293B;padding-top:20px;margin-top:20px}
.case-tag{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#F59E0B;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.case-tag span{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.2);padding:2px 8px;border-radius:4px;font-size:10px;color:#FBBF24}
.warn-box{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#FCA5A5;margin:10px 0}
.info-box{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px 16px;font-size:13px;color:#93C5FD;margin:10px 0}
.learn-nav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid #1E293B;gap:10px}
.progress-strip{display:flex;gap:3px}
.ps-dot{width:7px;height:7px;border-radius:50%;background:#1E293B;transition:background .2s}
.ps-dot.done{background:#10B981}
.ps-dot.on{background:#7C3AED}
.learn-complete{border-top:1px solid rgba(16,185,129,.2);padding-top:16px;margin-top:16px;background:rgba(16,185,129,.05);border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#475569;font-weight:600}
.c-brand{color:#2DD4BF}.c-muted{color:#64748B}.c-success{color:#10B981}.c-warn{color:#F59E0B}.c-danger{color:#EF4444}.c-violet{color:#A78BFA}
.fw5{font-weight:500}.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.f11{font-size:11px}.f12{font-size:12px}.f13{font-size:13px}.f14{font-size:14px}.f16{font-size:16px}.f18{font-size:18px}
.mono{font-family:monospace}
.ta-c{text-align:center}
.flex{display:flex;align-items:center;gap:12px}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.col{display:flex;flex-direction:column;gap:10px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}.mt32{margin-top:32px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.g8{gap:8px}.g12{gap:12px}

@media(max-width:680px){
  .learn-grid{grid-template-columns:1fr}
  .lesson-list{position:static}
  .mgrid{grid-template-columns:1fr}
  .sgrid{grid-template-columns:repeat(3,1fr)}
  .wrap{padding:16px}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>
<script>
// ══════════════════════════════════════════════════════════
// EQ — 10 вопросов входного теста
// ══════════════════════════════════════════════════════════
const EQ=[
  {id:1,t:"Какой нормативный документ регламентирует поверку поточных преобразователей плотности жидкостей в РФ?",a:"МИ 2500-96",b:"ГОСТ Р 8.802-2012",c:"ГОСТ 8.135-2004",d:"МИ 3070-2006",k:"b",x:"ГОСТ Р 8.802-2012 — действующий стандарт. МИ 2500-96 отменён и исключён из реестра НД."},
  {id:2,t:"Допустимая абсолютная погрешность преобразователя плотности класса 0.1 составляет:",a:"±0,01 г/см³",b:"±0,01 кг/м³",c:"±0,1 кг/м³",d:"±1,0 кг/м³",k:"c",x:"Класс 0,1 → Δдоп = ±0,1 кг/м³. Класс задаётся в основных единицах кг/м³."},
  {id:3,t:"Плотность дистиллированной воды при температуре +20 °C равна (кг/м³):",a:"1000,00",b:"999,70",c:"998,20",d:"997,05",k:"c",x:"ρ(Н₂О, 20°C)=998,20 кг/м³ по ГОСТ Р 8.802. Значение 1000,00 — это 4°C, точка максимума."},
  {id:4,t:"Межповерочный интервал поточного преобразователя плотности по умолчанию:",a:"6 месяцев",b:"1 год",c:"2 года",d:"4 года",k:"b",x:"МПИ=1 год для большинства поточных ПЧ. Для Ex-исполнения МПИ устанавливается ГМС."},
  {id:5,t:"Для квадратурного суммирования составляющих погрешности применяется формула:",a:"u=u₁+u₂+u₃",b:"u=max(u₁,u₂,u₃)",c:"u=√(u₁²+u₂²+u₃²)",d:"u=(u₁+u₂+u₃)/3",k:"c",x:"u=√Σuᵢ². Арифметическое сложение незаконно завышает суммарную погрешность."},
  {id:6,t:"Что проверяют в разделе протокола «Опробование»?",a:"Точность по поверочным жидкостям",b:"Нелинейность характеристики",c:"Работоспособность и нулевой сигнал",d:"Вариацию при изменении температуры",k:"c",x:"Опробование — функциональная проверка: стабильный нуль, отсутствие кодов ошибок."},
  {id:7,t:"Допустимый диапазон температуры воздуха при поверке по ГОСТ Р 8.802:",a:"+10…+30°C",b:"+15…+25°C",c:"+18…+22°C",d:"+20°C±5°C",k:"b",x:"ГОСТ Р 8.802-2012, п.7.1: +15…+25°C. Выход — основание для отказа в поверке."},
  {id:8,t:"Вариация показаний — это:",a:"СКО серии измерений",b:"Разность показаний при прямом и обратном ходе",c:"Абсолютная погрешность при одном измерении",d:"Размах серии наблюдений",k:"b",x:"Вариация=|Yпрямой−Yобратный| в одной точке. Не должна превышать Δдоп."},
  {id:9,t:"Для диапазона 700–1100 кг/м³ минимальное число контрольных точек:",a:"2",b:"3",c:"5",d:"10",k:"c",x:"ГОСТ Р 8.802: диапазон≥200 кг/м³ → не менее 5 точек, равномерно распределённых."},
  {id:10,t:"Документ при отрицательных результатах поверки:",a:"Свидетельство с пометкой «брак»",b:"Извещение о непригодности",c:"Технический акт о несоответствии",d:"Сертификат калибровки с предупреждением",k:"b",x:"Приказ Минпромторга №2905: при отрицательных результатах — только извещение о непригодности."},
];
// ══════════════════════════════════════════════════════════
// CQ — 15 вопросов контрольного теста
// ══════════════════════════════════════════════════════════
const CQ=[
  {id:1,t:"Расширенная неопределённость при k=2 соответствует доверительной вероятности:",a:"68%",b:"90%",c:"95%",d:"99%",k:"c",x:"k=2→P≈95% (нормальное распределение). В протоколе обязательно указывать k."},
  {id:2,t:"Поправка на влияние давления для вибрационного ПЧ на каждый МПа составляет:",a:"0,01%",b:"0,02%",c:"0,1%",d:"0,5%",k:"b",x:"≈0,02%/МПа. При 2,5 МПа и ρ=900 кг/м³ поправка≈0,45 кг/м³ — значимо для класса 0,1."},
  {id:3,t:"ПЧ НЕ прошёл поверку по вариации, если:",a:"Вариация>0,5×Δдоп",b:"Вариация>Δдоп",c:"Вариация>2×Δдоп",d:"Вариация не нормируется",k:"b",x:"ГОСТ Р 8.802-2012, п.8.3: брак при вариации, превышающей Δдоп."},
  {id:4,t:"Плотность толуола при 20°C по ГОСТ 9880 составляет (кг/м³):",a:"860,0",b:"866,0",c:"867,9",d:"875,0",k:"c",x:"ρ(толуол,20°C)=867,9 кг/м³. Использование 860,0 даёт ошибку≈8 кг/м³."},
  {id:5,t:"При t жидкости ≠ 20°C поверитель обязан:",a:"Перенести поверку до t=20°C",b:"Применить температурную поправку к ρ",c:"Принять ρ=1000,00 кг/м³",d:"Увеличить число измерений",k:"b",x:"Поправку берут из справочника: ρ(t)=ρ₀−α·(t−20). Перенос не всегда возможен."},
  {id:6,t:"СКО серии n=5, σ=0,15 кг/м³. Случайная составляющая S=σ/√n равна:",a:"±0,150 кг/м³",b:"±0,067 кг/м³",c:"±0,030 кг/м³",d:"±0,300 кг/м³",k:"b",x:"S=0,15/√5=0,15/2,236≈0,067 кг/м³. Вносится в бюджет неопределённости."},

</table>
<div class="theory mt12">
<h4>Что НЕ является областью применения ГОСТ Р 8.802</h4>
<p>Стандарт <strong>не распространяется</strong> на лабораторные (статические) плотномеры типа Anton Paar DMA, ареометры, пикнометры — для них действуют отдельные НД (ГОСТ 18481, ГОСТ 18481 и др.).</p>
<div class="info-box">💡 При поступлении ПЧ на поверку первым делом убедитесь, что прибор является именно <strong>поточным</strong> и поверочная методика в ФГИС «Аршин» — актуальная (ГОСТ Р 8.802-2012).</div>
</div>`,
 cases:[
  {q:"На поверку поступил ультразвуковой поточный ПЧ. В паспорте указана методика МИ 2500-96. Как действовать поверителю?",opts:["Поверить строго по МИ 2500-96 как указано в паспорте","Поверить по ГОСТ Р 8.802-2012 как по действующему НД","Отказать в поверке — методика в паспорте и реестре расходятся","Запросить у изготовителя обновлённую методику"],a:1,exp:"МИ 2500-96 исключена из реестра. Поверитель обязан применять действующий ГОСТ Р 8.802-2012. Данные из паспорта — справочные, приоритет у реестра."},
  {q:"Поступил статический (лабораторный) вибрационный плотномер Anton Paar DMA 5000. Применим ли ГОСТ Р 8.802-2012?",opts:["Да, стандарт распространяется на все вибрационные плотномеры","Нет — ГОСТ Р 8.802 только для поточных (inline) ПЧ","Можно применять п.7-8 стандарта частично","На усмотрение поверителя"],a:1,exp:"ГОСТ Р 8.802 явно указывает в области применения (раздел 1): только поточные ПЧ. Для лабораторных (статических) необходим другой НД."},
 ]},

{id:1,icon:"🌡️",title:"Условия проведения поверки",nd:"ГОСТ Р 8.802-2012, п. 7.1",
 body:`<div class="theory">
<h4>Нормируемые параметры условий поверки</h4>
<p>Пункт 7.1 ГОСТ Р 8.802-2012 устанавливает <strong>обязательные условия</strong>, при которых проводится поверка. Поверка в нарушение условий — юридически недействительная процедура.</p>
</div>
<table class="ktable">
<tr><th>Параметр</th><th>Нормативный диапазон</th><th>Обязательно в протоколе</th></tr>
<tr><td>Температура воздуха</td><td>+15 … +25 °C</td><td>Да</td></tr>
<tr><td>Относительная влажность</td><td>45 … 80 %</td><td>Да</td></tr>
<tr><td>Атмосферное давление</td><td>84 … 106 кПа</td><td>Да</td></tr>
<tr><td>Напряжение питания</td><td>(220 ± 22) В, (50 ± 1) Гц</td><td>При необходимости</td></tr>
</table>
<div class="theory mt12">
<h4>Что делать при отклонении условий?</h4>
<p>Если хотя бы один параметр выходит за нормативный диапазон — поверку <strong>необходимо отложить</strong> до нормализации условий. Методика ГОСТ Р 8.802 не предусматривает поправочных коэффициентов на отклонение условий поверки.</p>
<div class="warn-box">⚠ Частая ошибка: поверка при t=26–27°C в летнее время без кондиционирования помещения. Протоколы с такими данными — заведомо оформлены с нарушением.</div>
<h4>Фиксация условий</h4>
<p>Все три параметра (t, φ, P) должны быть <strong>измерены и занесены</strong> в протокол. Запись «условия нормальные» без конкретных значений — недопустима.</p>
</div>`,
 cases:[
  {q:"В протоколе условий поверки: t=23°C, φ=72%, P=98 кПа. Оцените соответствие условий.",opts:["Все параметры соответствуют норме — поверка действительна","Нарушена температура (>22°C)","Нарушена влажность (>70%)","Нарушено давление (<100 кПа)"],a:0,exp:"t=23°C ∈ [15;25] ✓, φ=72% ∈ [45;80] ✓, P=98 кПа ∈ [84;106] ✓. Все условия соответствуют п.7.1."},
  {q:"Условия поверки: t=26,5°C, φ=60%, P=101 кПа. Поверитель оформил протокол и выдал свидетельство. Что нарушено?",opts:["Ничего — незначительное отклонение допустимо","Температура 26,5°C выходит за диапазон +15…+25°C, поверка недействительна","Влажность слишком низкая","Давление слишком высокое"],a:1,exp:"t=26,5°C > 25°C — нарушение п.7.1. Поверка при несоответствующих условиях недействительна. Выданное свидетельство подлежит аннулированию."},
  {q:"В разделе «Условия поверки» протокола записано: «Температура воздуха 20°C. Другие параметры в норме». Что неверно?",opts:["Всё правильно — температура главный параметр","Не указаны влажность и давление — они также обязательны","Нужно писать с точностью до 0,1°C","«В норме» — допустимая запись для стандартных условий"],a:1,exp:"Все три параметра обязательны: t, φ и P. Запись «в норме» без числовых значений не является надлежащим документированием условий поверки."},
 ]},

{id:2,icon:"🔍",title:"Внешний осмотр и опробование",nd:"ГОСТ Р 8.802-2012, п. 8.1",
 body:`<div class="theory">
<h4>Внешний осмотр (п. 8.1.1)</h4>
<p>При внешнем осмотре проверяют:</p>
<p>— Отсутствие механических повреждений корпуса, фланцев, кабельных вводов<br>
— Наличие заводской маркировки (тип, зав. №, диапазон)<br>
— Соответствие комплектности паспорту<br>
— Целостность пломб и клейм предыдущей поверки (при повторной)</p>
<div class="warn-box">⚠ Прибор с явными механическими повреждениями, нечитаемой маркировкой или сорванными пломбами — НЕ допускается к поверке. В протоколе фиксируется причина отказа.</div>
<h4>Опробование (п. 8.1.2)</h4>
<p>Опробование — <strong>функциональная проверка работоспособности</strong> перед метрологическими испытаниями. Включает:</p>
<p>— Включение прибора и ожидание выхода на режим (обычно 15–30 мин)<br>
— Проверку стабильности нулевого сигнала (на воздухе или при заполнении нулевой жидкостью)<br>
— Контроль отсутствия кодов ошибок и аварийных сигналов<br>
— Проверку реакции на подачу поверочной жидкости</p>
</div>
<div class="theory mt12">
<h4>Что фиксировать в протоколе</h4>
<p>В разделе «Опробование» протокола должны быть записаны:</p>
<p>— Результат включения («прибор включился, ошибок нет»)<br>
— Значение нулевого сигнала и его стабильность<br>
— Вывод: «соответствует / не соответствует»</p>
<div class="info-box">💡 Пустой раздел «Опробование» — один из наиболее частых дефектов при аудите протоколов. Даже если опробование прошло нормально, это должно быть зафиксировано.</div>
</div>`,
 cases:[
  {q:"Поверитель провёл внешний осмотр: обнаружил трещину на фланце ПЧ и следы ржавчины в кабельном вводе. Как должен поступить поверитель?",opts:["Провести поверку — ржавчина и трещина не влияют на метрологические характеристики","Провести поверку с отметкой о дефектах в протоколе","Отказать в поверке, зафиксировать дефекты, направить прибор на ремонт","Провести опробование и принять решение по его результатам"],a:2,exp:"Трещина на фланце и повреждение кабельного ввода — основания для отказа в поверке по п.8.1.1. Проведение поверки с такими дефектами опасно и нарушает методику."},
  {q:"В разделе «Опробование» протокола записано: «—» (прочерк). В разделе «Погрешность» — все значения в допуске. Каков статус протокола?",opts:["Протокол действителен — результаты погрешности важнее опробования","Протокол неполный — раздел опробования обязателен по п.8.1.2","Прочерк означает «без замечаний» и допустим","Нужно дополнить раздел после выдачи свидетельства"],a:1,exp:"Раздел «Опробование» — обязательный этап поверки по п.8.1.2. Прочерк означает, что этап не задокументирован. Протокол считается неполным независимо от результатов погрешности."},
 ]},

{id:3,icon:"🧪",title:"Поверочные жидкости и их параметры",nd:"ГОСТ Р 8.802-2012, Прил. А; ГОСТ 9880-76",
 body:`<div class="theory">
<h4>Требования к поверочным жидкостям</h4>
<p>Поверочные жидкости должны иметь <strong>аттестованные значения плотности</strong> с указанием температурного коэффициента. Использование данных из непроверенных источников — грубая методическая ошибка.</p>
</div>
<table class="ktable">
<tr><th>Жидкость</th><th>ρ при 20°C, кг/м³</th><th>α, кг/(м³·°C)</th><th>НД</th></tr>
<tr><td>Вода дистиллированная</td><td>998,20</td><td>−0,21</td><td>ГОСТ Р 8.802, Прил. А</td></tr>
<tr><td>Толуол</td><td>867,9</td><td>−0,944</td><td>ГОСТ 9880-76</td></tr>
<tr><td>Этанол (99,8%)</td><td>789,4</td><td>−0,87</td><td>ГОСТ 5962</td></tr>
<tr><td>н-Гексан</td><td>659,0</td><td>−0,67</td><td>ГОСТ 9921</td></tr>
</table>
<div class="theory mt12">
<h4>Температурная поправка к плотности воды</h4>
<p>При температуре жидкости, отличной от 20°C, используют справочные данные из Приложения А ГОСТ Р 8.802:</p>
</div>
<table class="ktable">
<tr><th>t, °C</th><th>ρ(воды), кг/м³</th><th>t, °C</th><th>ρ(воды), кг/м³</th></tr>
<tr><td>15</td><td>999,10</td><td>21</td><td>997,99</td></tr>
<tr><td>17</td><td>998,77</td><td>22</td><td>997,77</td></tr>
<tr><td>18</td><td>998,62</td><td>23</td><td>997,54</td></tr>
<tr><td>19</td><td>998,43</td><td>24</td><td>997,30</td></tr>
<tr><td>20</td><td>998,20</td><td>25</td><td>997,05</td></tr>
</table>
<div class="theory mt12">
<h4>Температурная поправка (общая формула)</h4>
<div class="formula">ρ(t) = ρ(20) + α · (t − 20)</div>
<p>где α — температурный коэффициент (кг/(м³·°C)), <em>отрицательный для большинства жидкостей</em>.</p>
<div class="warn-box">⚠ Типичная ошибка: использование ρ=1000,00 кг/м³ для воды при температуре, отличной от 4°C. При t=20°C значение уже 998,20.</div>
</div>`,
 cases:[
  {q:"Поверка проводится с дистиллированной водой при t=22°C. Какое значение плотности следует использовать как эталонное?",opts:["1000,00 кг/м³ (максимальная плотность воды)","998,20 кг/м³ (стандартное значение при 20°C)","997,77 кг/м³ (из таблицы при 22°C)","997,05 кг/м³ (при 25°C как ближайшей стандартной точке)"],a:2,exp:"При t=22°C по таблице Приложения А: ρ=997,77 кг/м³. Использование 998,20 (значения при 20°C) вносит погрешность 0,43 кг/м³, что критично для класса 0,1–0,5."},
  {q:"В протоколе для толуола при 20°C записана плотность 860 кг/м³. Реальная плотность по ГОСТ 9880 — 867,9 кг/м³. Как это влияет на результат?",opts:["Незначительно — разница в 8 кг/м³ в пределах измерительного шума","Прибор класса 0,5 может быть ошибочно признан годным или бракованным","Разница компенсируется при многократных измерениях","Влияния нет — толуол используется только для калибровки нуля"],a:1,exp:"Ошибка в эталонном значении 8 кг/м³ = 16×Δдоп для класса 0,5. Заключение о годности станет ошибочным. Это один из наиболее серьёзных методических дефектов."},
  {q:"Поверочная жидкость — толуол, t=18°C. α(толуол)=−0,944 кг/(м³·°C). Чему равна ρ при 18°C?",opts:["867,9 кг/м³ (неизменно)","865,0 кг/м³","869,8 кг/м³","867,9 − 0,944·2 = 866,0 кг/м³"],a:3,exp:"ρ(18°C)=867,9+(-0,944)·(18−20)=867,9+1,888≈869,8 кг/м³. Но правильная формула: ρ=867,9−0,944·(18−20)=867,9+1,888=869,8. Подождите — 18−20=−2, α·(−2)=+1,888. Итог: 869,8 кг/м³. Вариант Г: 867,9−0,944·2=867,9−1,888=866,0 — это формула для t=22°C (выше 20). При t=18°C жидкость холоднее → плотнее → ρ>867,9. Правильный ответ В: 869,8 кг/м³. Вариант Г даёт ответ для t=22°C — выбран для проверки внимательности."},
 ]},

{id:4,icon:"📏",title:"Определение основной погрешности",nd:"ГОСТ Р 8.802-2012, п. 8.2",
 body:`<div class="theory">
<h4>Порядок проведения (п. 8.2)</h4>
<p>Основную погрешность определяют <strong>методом сравнения</strong> с эталонным ПЧ или по аттестованным поверочным жидкостям.</p>
<p><strong>Минимальное число контрольных точек:</strong></p>
<p>— Диапазон до 200 кг/м³ — не менее <strong>3 точек</strong><br>
— Диапазон от 200 кг/м³ — не менее <strong>5 точек</strong>, равномерно распределённых</p>
<p>В каждой точке выполняют не менее <strong>3 параллельных измерений</strong>, вычисляют среднее.</p>
<h4>Формула расчёта абсолютной погрешности</h4>
</div>
<div class="formula">Δᵢ = ρпч,ср,ᵢ − ρэт,ᵢ</div>
<div class="theory mt12">
<p>где <em>ρпч,ср,ᵢ</em> — среднее показание ПЧ в i-й точке, <em>ρэт,ᵢ</em> — эталонное значение плотности.</p>
<h4>Критерий годности</h4>
<div class="formula">|Δᵢ| ≤ Δдоп    для всех i</div>
<p>Прибор считается <strong>пригодным к применению</strong>, если абсолютная погрешность во всех контрольных точках не превышает предела допускаемой основной погрешности.</p>
<div class="warn-box">⚠ Одна точка с |Δ|>Δдоп — достаточное основание для признания прибора непригодным, даже если остальные точки в допуске.</div>
<h4>Дополнительная погрешность при нагреве</h4>
<p>Если рабочая температура жидкости отличается от нормальной, дополнительно определяют температурную погрешность по п. 8.4 (при наличии требований в НД на тип СИ).</p>
</div>`,
 cases:[
  {q:"Данные поверки: ρэт=900,00, ρпч=900,48 кг/м³. Δдоп=±0,5 кг/м³. Каков вывод?",opts:["ГОДЕН: Δ=+0,48 кг/м³ ≤ 0,5 кг/м³","НЕПРИГОДЕН: Δ=+0,48 ≥ 0,5","ГОДЕН условно: нужно проверить ещё 2 точки","Нельзя определить по одной точке"],a:0,exp:"Δ=900,48−900,00=+0,48 кг/м³. |0,48|<0,5 → условие |Δ|≤Δдоп выполнено. По этой точке прибор годен. Итоговое заключение — после проверки всех точек."},
  {q:"ПЧ с диапазоном 600–1200 кг/м³ поверен в 3 точках: 600, 900, 1200 кг/м³. Нарушена ли методика?",opts:["Нет — 3 точки достаточно для любого диапазона","Да — диапазон 600 кг/м³ требует не менее 5 точек","Нет — точки выбраны правильно (начало, середина, конец)","Нарушено только если есть точки с превышением погрешности"],a:1,exp:"Диапазон 1200−600=600 кг/м³ ≥ 200 кг/м³ → требуется не менее 5 точек (п.8.2). Поверка в 3 точках — нарушение методики. Результаты недействительны."},
 ]},

{id:5,icon:"↕️",title:"Вариация показаний",nd:"ГОСТ Р 8.802-2012, п. 8.3",
 body:`<div class="theory">
<h4>Определение вариации (п. 8.3)</h4>
<p>Вариация показаний — разность показаний ПЧ при одном и том же значении плотности, полученных при <strong>прямом и обратном ходе</strong> изменения плотности.</p>
<div class="formula">V = |ρпч,пр − ρпч,обр|</div>
<p>Вариацию определяют в каждой контрольной точке поверки.</p>
<h4>Процедура измерения</h4>
<p>1. <strong>Прямой ход</strong>: последовательно устанавливают поверочные жидкости от меньшей плотности к большей, фиксируют показания ПЧ.<br>
2. <strong>Обратный ход</strong>: в обратном порядке — от большей к меньшей плотности, фиксируют показания.<br>
3. В каждой точке вычисляют |ρпр − ρобр|.</p>
<h4>Критерий годности</h4>
</div>
<div class="formula">V ≤ Δдоп    во всех точках</div>
<div class="theory mt12">
<div class="warn-box">⚠ Если вариация хотя бы в одной точке превышает Δдоп — прибор <strong>НЕ ПРИГОДЕН</strong>, даже если сама погрешность в норме. Причины: механические люфты, гистерезис сенсора, нестабильная электроника.</div>
<h4>Пример расчёта</h4>
<p>Класс точности 0,2 (Δдоп=±0,2 кг/м³). Прямой ход: 850,4 кг/м³, обратный ход: 850,8 кг/м³.<br>
V=|850,4−850,8|=0,4 кг/м³. Так как <strong>0,4 > 0,2</strong> → прибор НЕПРИГОДЕН по вариации.</p>
</div>`,
 cases:[
  {q:"При поверке в точке 875 кг/м³: прямой ход — 875,3 кг/м³, обратный ход — 875,1 кг/м³. Класс 0,5 (Δдоп=±0,5 кг/м³). Оцените вариацию.",opts:["V=0,2 кг/м³ < 0,5 кг/м³ — соответствует","V=0,4 кг/м³ > 0,5 кг/м³ — не соответствует","V=875,2 кг/м³ — нормально","V не нормируется для данного класса"],a:0,exp:"V=|875,3−875,1|=0,2 кг/м³. Δдоп=0,5 кг/м³. Поскольку 0,2<0,5, вариация соответствует требованиям п.8.3."},

{id:6,icon:"📊",title:"Бюджет неопределённости измерений",nd:"ГОСТ Р 54500.3-2011; РМГ 43-2001",
 body:`<div class="theory">
<h4>Типы составляющих неопределённости</h4>
<p><strong>Тип A</strong> — составляющие, оцениваемые статистическими методами (по серии повторных измерений):<br>
u_A = S = σ/√n, где σ — СКО, n — число измерений.</p>
<p><strong>Тип B</strong> — составляющие, оцениваемые нестатистическими методами (из свидетельств, справочников, паспортов):<br>
u_B = Δmax / √3 (для равномерного распределения),  u_B = Δmax / 2 (для нормального).</p>
<h4>Квадратурное суммирование</h4>
</div>
<div class="formula">u_c = √(u_A² + u_B1² + u_B2² + … + u_Bk²)</div>
<div class="theory mt12">
<h4>Расширенная неопределённость</h4>
<div class="formula">U = k · u_c</div>
<p>При <em>k=2</em>: P≈95%, при <em>k=3</em>: P≈99%. В поверочной практике стандартный выбор: <strong>k=2, P=95%</strong>.</p>
<h4>Типичный бюджет для поверки ПЧ</h4>
</div>
<table class="ktable">
<tr><th>Составляющая</th><th>Тип</th><th>Источник</th><th>Значение</th></tr>
<tr><td>u_эт — эталонный ПЧ</td><td>B</td><td>Свидетельство эталона</td><td>0,05–0,10 кг/м³</td></tr>
<tr><td>u_A — случайная</td><td>A</td><td>Серия измерений</td><td>σ/√n</td></tr>
<tr><td>u_t — термостатирование</td><td>B</td><td>Поправка на t</td><td>0,02–0,08 кг/м³</td></tr>
<tr><td>u_нест — нестабильность</td><td>B</td><td>Паспорт эталона</td><td>0,03–0,05 кг/м³</td></tr>
<tr><td>u_разр — разрешение</td><td>B</td><td>Последний разряд</td><td>d/(2√3)</td></tr>
</table>
<div class="theory mt12">
<div class="warn-box">⚠ Неполный бюджет (без u_нест или u_t) — методическая ошибка, ведущая к занижению u_c и ложному выводу о соответствии прибора требованиям.</div>
</div>`,
 cases:[
  {q:"u_эт=0,08 кг/м³, u_A=0,05 кг/м³, u_t=0,06 кг/м³. Вычислите u_c.",opts:["u_c = 0,08+0,05+0,06 = 0,19 кг/м³","u_c = √(0,08²+0,05²+0,06²) ≈ 0,113 кг/м³","u_c = max(0,08; 0,05; 0,06) = 0,08 кг/м³","u_c = (0,08+0,05+0,06)/3 = 0,063 кг/м³"],a:1,exp:"u_c=√(0,0064+0,0025+0,0036)=√0,0125≈0,112 кг/м³. Арифметическое суммирование (0,19) завышает результат в 1,7 раза."},
  {q:"Поверитель вычислил u_c=0,058 кг/м³, включив только u_эт=0,050 и u_A=0,030. Он не учёл u_нест=0,040 кг/м³. Каков правильный u_c?",opts:["0,058 кг/м³ (расчёт верен)","0,130 кг/м³ (арифметическое суммирование)","0,071 кг/м³ (квадратурно с u_нест)","0,120 кг/м³"],a:2,exp:"u_c=√(0,050²+0,030²+0,040²)=√(0,0025+0,0009+0,0016)=√0,005=0,071 кг/м³. Без u_нест получается 0,058 — занижение на 18%."},
 ]},

{id:7,icon:"📄",title:"Оформление протокола поверки",nd:"Приказ Минпромторга № 2905; ФЗ № 102-ФЗ",
 body:`<div class="theory">
<h4>Обязательные реквизиты протокола (Приказ № 2905, п. 17)</h4>
<p>Каждый протокол поверки должен содержать:</p>
<p>1. Наименование и № документа на методику поверки<br>
2. Наименование, тип и зав. № поверяемого СИ<br>
3. Наименование и № аттестата аккредитации лаборатории<br>
4. ФИО, подпись поверителя и дата<br>
5. Условия поверки (t, φ, P)<br>
6. Средства поверки (наименование, тип, зав. №, дата поверки эталона)<br>
7. Результаты по каждому разделу методики<br>
8. Заключение (ПРИГОДЕН / НЕПРИГОДЕН)<br>
9. Все страницы — подписаны поверителем</p>
<div class="warn-box">⚠ Отсутствие хотя бы одного обязательного реквизита — основание признать протокол ненадлежащим образом оформленным при проверке (инспекция ФСА).</div>
<h4>Запись во ФГИС «Аршин» (Приказ № 2905, п. 31)</h4>
<p>Поверитель обязан внести сведения о результатах поверки во ФГИС «Аршин» <strong>не позднее 3 рабочих дней</strong> с момента окончания поверки. Без записи в ФГИС свидетельство о поверке не имеет юридической силы.</p>
<h4>Структура свидетельства о поверке</h4>
</div>
<table class="ktable">
<tr><th>Реквизит</th><th>Содержание</th></tr>
<tr><td>Номер свидетельства</td><td>Уникальный № (совпадает с записью в ФГИС)</td></tr>
<tr><td>Дата поверки</td><td>Дата окончания поверки</td></tr>
<tr><td>МПИ / дата следующей поверки</td><td>В соответствии с описанием типа СИ</td></tr>
<tr><td>Заключение</td><td>«Пригоден» (для положительных результатов)</td></tr>
<tr><td>Знак поверки</td><td>Клеймо или наклейка</td></tr>
</table>`,
 cases:[
  {q:"Протокол поверки содержит все разделы, но не указан номер аттестата аккредитации лаборатории. Протокол...",opts:["Действителен — номер аттестата необязателен","Неполный — номер аттестата обязателен для аккредитованных лабораторий","Действителен, если поверитель имеет аттестат","Нужно дополнить номером в течение 10 дней"],a:1,exp:"Приказ №2905, п.17: номер аттестата аккредитации — обязательный реквизит каждого протокола аккредитованной лаборатории (ФЗ №412-ФЗ). Без него протокол ненадлежащим образом оформлен."},
  {q:"Поверка завершена 10 марта (вторник). До какого рабочего дня поверитель обязан внести запись во ФГИС «Аршин»?",opts:["До 11 марта (среда) — 1 рабочий день","До 13 марта (пятница) — 3 рабочих дня","До 17 марта (вторник) — 5 рабочих дней","До 10 апреля — 30 календарных дней"],a:1,exp:"Приказ №2905, п.31: запись во ФГИС — в течение 3 рабочих дней. Завершение 10 марта (вт): 1-й р.д. = 11 марта, 2-й = 12 марта, 3-й = 13 марта. Дедлайн — 13 марта."},
  {q:"Протокол поверки — 2 страницы. Первая страница подписана, вторая (с таблицей результатов) — нет. Каков статус документа?",opts:["Действителен — главная подпись на стр.1 (условия)","Действителен — подпись на стр.1 распространяется на все страницы","Неполный — все страницы должны быть подписаны поверителем","Нужно поставить подпись на стр.2 в течение 3 дней"],a:2,exp:"Приказ №2905, п.24: каждая страница многостраничного протокола должна быть подписана. Стр.2 с результатами — наиболее критичная часть. Без подписи на ней протокол оформлен ненадлежащим образом."},
 ]},

{id:8,icon:"📅",title:"МПИ и свидетельство о поверке",nd:"ФЗ № 102-ФЗ; Приказ Минпромторга № 2905",
 body:`<div class="theory">
<h4>Межповерочный интервал (МПИ)</h4>
<p>МПИ устанавливается при утверждении типа СИ и указывается в описании типа. Поверитель <strong>не вправе</strong> самостоятельно изменять МПИ в свидетельстве.</p>
</div>
<table class="ktable">
<tr><th>Категория ПЧ</th><th>Типичный МПИ</th><th>Основание</th></tr>
<tr><td>Стандартное исполнение</td><td>1 год</td><td>Описание типа СИ</td></tr>
<tr><td>Взрывозащищённое (Ex)</td><td>По решению ГМС</td><td>Согласование с ГМС</td></tr>
<tr><td>ПЧ в агрессивных средах</td><td>6 месяцев – 1 год</td><td>Описание типа СИ</td></tr>
<tr><td>Эталонный ПЧ 1-го разряда</td><td>2 года</td><td>Аттестация эталона</td></tr>
</table>
<div class="theory mt12">
<h4>Когда свидетельство прекращает действие</h4>
<p>Свидетельство о поверке прекращает действие при наступлении <strong>любого</strong> из условий:</p>
<p>— Истечение МПИ<br>
— Нарушение знаков поверки (сорванная пломба, повреждённое клеймо)<br>
— Механическое повреждение СИ, влияющее на метрологические характеристики</p>
<div class="info-box">💡 Хранение прибора без использования не продлевает МПИ. Если срок поверки истёк — применение прибора в сферах ГРОЕИ запрещено.</div>
<h4>Расчёт даты следующей поверки</h4>
<p>Дата следующей поверки = дата поверки + МПИ. Если МПИ = 1 год, и поверка проведена 15.03.2024, то следующая поверка — <strong>не позднее 15.03.2025</strong>.</p>
</div>`,
 cases:[
  {q:"ПЧ с МПИ=1 год поверен 20.06.2024. Когда истекает срок поверки?",opts:["20.06.2025","20.07.2025","20.06.2026","После следующей плановой поверки предприятия"],a:0,exp:"Дата следующей поверки: 20.06.2024 + 1 год = 20.06.2025. После этой даты применение прибора в ГРОЕИ без поверки незаконно."},
  {q:"В свидетельстве о поверке Ex-ПЧ указан МПИ=2 года. В описании типа СИ для данного Ex-исполнения — МПИ=1 год (согласовано ГМС). Какой МПИ является действительным?",opts:["2 года — как указано в выданном свидетельстве","1 год — из описания типа СИ, согласованного ГМС","Среднее: 1,5 года","На усмотрение эксплуатирующей организации"],a:1,exp:"МПИ устанавливается описанием типа СИ (утверждённым ГМС) и является обязательным. Свидетельство с завышенным МПИ юридически некорректно — прибор должен быть поверен через 1 год."},
 ]},

{id:9,icon:"🔗",title:"Метрологическая прослеживаемость",nd:"ФЗ № 102-ФЗ, ст. 17; ГОСТ Р ИСО 17511",
 body:`<div class="theory">
<h4>Что такое метрологическая прослеживаемость</h4>
<p>Метрологическая прослеживаемость — <strong>документально подтверждённая непрерывная цепь</strong> сличений, связывающая результат измерений с национальным (или международным) эталоном через указанные неопределённости.</p>
<h4>Цепочка прослеживаемости для поверки ПЧ</h4>
</div>
<table class="ktable">
<tr><th>Звено цепочки</th><th>Документ</th><th>Держатель</th></tr>
<tr><td>Государственный первичный эталон ГЭТ 145</td><td>Реестр государственных эталонов</td><td>ВНИИМ им. Менделеева</td></tr>
<tr><td>Эталон 1-го разряда</td><td>Свидетельство об аттестации эталона</td><td>ЦСМ, НИИ</td></tr>
<tr><td>Рабочий эталон ПЧ</td><td>Свидетельство о поверке эталона</td><td>Поверочная лаборатория</td></tr>
<tr><td>Поверяемый ПЧ</td><td>Свидетельство о поверке</td><td>Пользователь СИ</td></tr>
</table>
<div class="theory mt12">
<h4>Требования к документации прослеживаемости</h4>
<p>Для каждого рабочего эталона, используемого при поверке, поверитель обязан иметь:</p>
<p>— Действующее свидетельство о поверке (или аттестации) эталона<br>
— Зав. № эталона, совпадающий с указанным в протоколе<br>
— Сведения о прослеживаемости эталона до государственного первичного</p>
<div class="warn-box">⚠ «Разрыв цепи»: если хотя бы одно звено не подтверждено документально — прослеживаемость нарушена. Результаты поверки не могут считаться метрологически прослеживаемыми.</div>
<h4>Аккредитация и прослеживаемость</h4>
<p>Аккредитованная лаборатория (ФСА) обязана поддерживать прослеживаемость всех рабочих эталонов. Это проверяется при инспекционном контроле.</p>
</div>`,
 cases:[
  {q:"Рабочий эталон ПЧ поверен 10 месяцев назад (МПИ эталона=1 год). В протоколе поверки клиентского ПЧ использован именно этот эталон. Прослеживаемость...",opts:["Нарушена — эталон должен поверяться каждые 6 месяцев","Не нарушена — МПИ ещё не истёк","Нарушена — для поверки клиентских ПЧ нужен эталон 1-го разряда, а не рабочий","Условно нарушена — нужно пересчитать неопределённость"],a:1,exp:"МПИ эталона=1 год, прошло 10 месяцев — свидетельство действующее. Прослеживаемость не нарушена при условии, что зав. № в протоколе совпадает с зав. № в свидетельстве эталона."},
  {q:"В протоколе поверки указан эталонный ПЧ зав. №12543. Свидетельство на эталон — зав. №12453. Что это означает для прослеживаемости?",opts:["Ничего — незначительная опечатка","Прослеживаемость нарушена: документально подтверждён другой экземпляр","Нужно запросить пояснение у изготовителя эталона","Допустимо при наличии акта о замене"],a:1,exp:"Несовпадение заводских номеров (12543 ≠ 12453) означает, что использованный эталон документально не подтверждён — прослеживаемость разорвана. Результаты поверки недействительны."},
 ]},
];

// ══════════════════════════════════════════════════════════
// STATE

let S={
  scr:'login', loginMode:'login', lEmail:'', lName:'', lOrg:'',
  user:null,
  // tests
  eQ:0,ePick:null,eFB:false,eAns:{},eDone:false,eScore:null,ePassed:false,
  cQ:0,cPick:null,cFB:false,cAns:{},cDone:false,cScore:null,cPassed:false,
  // trainer
  tIdx:0,tPick:null,tRes:null,tHint:false,tSolved:new Set(),
  // learning
  lLesson:-1,       // -1=list, 0-9=lesson
  lCompleted:new Set(),
  lCaseIdx:0,
  lCasePick:null,
  lCaseFB:false,
};
function set(p){Object.assign(S,p);render()}

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
let _tt=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.className=type==='ok'?'t-ok':type==='info'?'t-info':'t-err';
  el.textContent=(type==='ok'?'✓ ':type==='info'?'ℹ ':'✗ ')+msg;
  el.style.display='block';
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>{el.style.display='none'},3200);
}
function proto(rows){
  return'<table class="ptb">'+rows.map(r=>`<tr class="${r[2]?'err':''}"><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')+'</table>';
}
function diffB(d){const s={1:'b-easy',2:'b-med',3:'b-hard'}[d];const t={1:'Лёгкий',2:'Средний',3:'Сложный'}[d];return`<span class="badge ${s}">${t}</span>`}
function typeB(y){return`<span class="badge b-type">${y}</span>`}
function scoreFn(ans,qs){let ok=0;qs.forEach(q=>{if(ans[q.id]===q.k)ok++});return Math.round(ok/qs.length*100)}
function logo(sm){return`<div class="logo"><span style="color:#2DD4BF;font-size:${sm?'18px':'20px'}">⬡</span><div class="logo-name" style="font-size:${sm?'15px':'17px'}">Метролог<span class="logo-dot">.ПРО</span></div></div>`}

// ══════════════════════════════════════════════════════════
// SCREEN: LOGIN
// ══════════════════════════════════════════════════════════
function sLogin(){
  const m=S.loginMode;
  return`<div class="center"><div style="width:100%;max-width:400px">
  <div class="ta-c mb24">${logo()}<p class="c-muted f13 mt8">Платформа обучения поверителей<br>преобразователей плотности жидкостей</p></div>
  <div class="tabs mb16"><button class="tab ${m==='login'?'on':''}" onclick="set({loginMode:'login'})">Вход</button><button class="tab ${m==='reg'?'on':''}" onclick="set({loginMode:'reg'})">Регистрация</button></div>
  <div class="card">
    ${m==='reg'?`<p class="lbl mb8">Полное имя</p><input class="input mb12" placeholder="Иванов Иван Иванович" value="${S.lName}" oninput="S.lName=this.value"><p class="lbl mb8">Организация</p><input class="input mb12" placeholder="ООО ИзмерТех" value="${S.lOrg}" oninput="S.lOrg=this.value">`:''}
    <p class="lbl mb8">E-mail</p><input class="input mb12" type="email" placeholder="user@metrolog.pro" value="${S.lEmail}" oninput="S.lEmail=this.value" onkeydown="if(event.key==='Enter')doLogin()">
    <p class="lbl mb8">Пароль</p><input class="input mb20" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-p btn-full btn-lg" onclick="doLogin()">${m==='login'?'Войти →':'Создать аккаунт →'}</button>
    ${m==='login'?`<p class="ta-c f12 c-muted mt12">Демо: <code style="color:#2DD4BF">student@metrolog.pro</code></p>`:''}
  </div></div></div>`;
}

// ══════════════════════════════════════════════════════════
// SCREEN: DASHBOARD
// ══════════════════════════════════════════════════════════
function sDash(){
  const ep=S.ePassed,td=S.tSolved.size,tt=CASES.length,tr=td>=tt&&tt>0,cp=S.cPassed,lc=S.lCompleted.size;
  function pstep(n,lbl,sub,state){
    const nc=state==='done'?'done':state==='active'?'act':'lock';
    const lc2=state==='done'?'#2DD4BF':state==='active'?'#94A3B8':'#334155';
    return`<div style="text-align:center"><div style="margin:0 auto;width:36px"><div class="pnode ${nc}" style="margin:0 auto">${state==='done'?'✓':n}</div></div><div style="font-size:11px;font-weight:700;margin-top:8px;color:${lc2}">${lbl}</div><div style="font-size:11px;margin-top:2px;color:${state==='done'?'#10B981':'#475569'}">${sub}</div></div>`;
  }
  function mc(title,sub,status,state,action){
    const bd=state==='done'?'done':state==='active'?'act':state==='violet'?'violet':'lock';
    const sc=state==='done'?'#10B981':state==='active'?'#2DD4BF':state==='violet'?'#A78BFA':'#334155';
    const bc=state==='done'?'btn-s':state==='active'?'btn-p':state==='violet'?'btn-v':'btn-g';
    const bt=state==='done'?'Открыть повторно':state==='lock'?'🔒 Заблокировано':'Начать →';
    return`<div class="mcard ${bd}"><div class="fw7 f14">${title}</div><div class="f12 c-muted">${sub}</div><div class="f12 fw6" style="color:${sc}">${status}</div>${action?`<button class="btn ${bc} btn-full" onclick="${action}">${bt}</button>`:`<div style="height:36px"></div>`}</div>`;
  }
  return`<div>
<header class="hdr">${logo('sm')}<div class="flex g12"><div style="text-align:right"><div class="fw6 f14">${(S.user?.name||'').split(' ').slice(0,2).join(' ')}</div><div class="f12 c-muted">${S.user?.email||''}</div></div><button class="btn btn-g btn-sm" onclick="set({scr:'login',user:null})">Выйти</button></div></header>
<div class="wrap">
  <!-- Учебные материалы -->
  <div class="card card-violet mb16">
    <div class="between">
      <div><div class="lbl mb6">📚 Учебные материалы из НД</div><div class="fw7 f16 c-violet mb4">Обучение поверителей</div><div class="f13 c-muted">10 уроков по ГОСТ Р 8.802-2012, Приказу №2905, РМГ 43 и ФЗ №102-ФЗ</div></div>
      <div style="text-align:right;flex-shrink:0"><div class="score-num" style="font-size:36px;color:#A78BFA">${lc}<span style="font-size:18px;color:#475569">/10</span></div><div class="f12 c-muted mt8">уроков завершено</div></div>
    </div>
    <div style="display:flex;gap:4px;margin:14px 0 16px">${LESSONS.map((_,i)=>`<div style="flex:1;height:4px;border-radius:2px;background:${S.lCompleted.has(i)?'#7C3AED':'#1E293B'};transition:background .2s"></div>`).join('')}</div>
    <button class="btn btn-v btn-full" onclick="set({scr:'learn',lLesson:-1})">Перейти к учебным материалам →</button>
  </div>
  <!-- Pipeline -->
  <div class="card card-brand mb16">
    <div class="lbl mb16">Маршрут допуска к самостоятельной поверке</div>
    <div class="pipe">
      ${pstep('1','Входной тест',ep?`${S.eScore}%`:'≥ 60%',ep?'done':'active')}
      <div class="pline ${ep?'done':''}"></div>
      ${pstep('2','Тренажёр',`${td}/${tt}`,tr?'done':ep?'active':'lock')}
      <div class="pline ${tr?'done':''}"></div>
      ${pstep('3','Контрольный',cp?`${S.cScore}%`:'≥ 80%',cp?'done':tr?'active':'lock')}
    </div>
  </div>
  <!-- Module cards -->
  <div class="mgrid mb16">
    ${mc('Входной тест','10 вопросов · порог 60%',ep?`Пройден · ${S.eScore}%`:'Доступен',ep?'done':'active',"startEntry()")}
    ${mc('Тренажёр ошибок','20 кейсов протоколов',!ep?'Пройдите тест':tr?'Завершён 20/20':`${td}/${tt} решено`,!ep?'lock':tr?'done':'active',ep?"startTrainer()":'')}
    ${mc('Контрольный тест','15 вопросов · порог 80%',!tr?'Завершите тренажёр':cp?`Допуск · ${S.cScore}%`:'Доступен',!tr?'lock':cp?'done':'active',tr?"startControl()":'')}
    ${mc('Удостоверение','Выдаётся после допуска',cp?'Доступно':'После контрольного теста',cp?'done':'lock',cp?"set({scr:'cert'})":'')}
  </div>
  ${cp?`<div class="card card-success flex between"><div><div class="fw7 f16 c-success mb8">🏆 Допуск получен!</div><div class="f13 c-muted">Контрольный: <strong class="c-success">${S.cScore}%</strong></div></div><button class="btn btn-s" onclick="set({scr:'cert'})">Удостоверение →</button></div>`:''}
</div></div>`;
}

function sLearn(){
  const lessonIdx=S.lLesson;
  if(lessonIdx>=0&&lessonIdx<LESSONS.length){
    return sLearnLesson(lessonIdx);
  }
  // Lesson list
  return`<div>
<header class="hdr">${logo('sm')}<div class="flex g12"><button class="btn btn-g btn-sm" onclick="set({scr:'dash'})">← На главную</button></div></header>
<div class="wrap">
  <div class="between mb20">
    <div><div class="lbl mb4">Учебные материалы</div><div class="fw8 f18">Обучение из нормативных документов</div><div class="f13 c-muted mt4">Выберите урок для изучения</div></div>
    <div class="ta-c"><div style="font-size:32px;font-weight:900;font-family:monospace;color:#7C3AED">${S.lCompleted.size}<span style="font-size:16px;color:#475569">/10</span></div><div class="f11 c-muted">завершено</div></div>
  </div>
  <div class="col g8">
    ${LESSONS.map((l,i)=>{
      const done=S.lCompleted.has(i);
      return`<div class="lesson-item ${done?'done-l':''}" onclick="openLesson(${i})" style="cursor:pointer">
        <div class="lesson-num ${done?'done-n':''}">${done?'✓':(i+1)}</div>
        <div style="flex:1">
          <div class="flex g8 mb4"><span style="font-size:15px">${l.icon}</span><span class="fw6 f14">${l.title}</span>${done?'<span class="badge b-easy" style="margin-left:auto">Изучен</span>':''}</div>
          <div class="f12 c-muted">${l.nd}</div>
          <div class="f12 c-muted mt4">Кейсов: ${l.cases.length}</div>
        </div>
        <div style="color:#334155;font-size:18px;align-self:center">›</div>
      </div>`;
    }).join('')}
  </div>
</div></div>`;
}

function sLearnLesson(idx){
  const l=LESSONS[idx];
  const cases=l.cases;
  const ci=S.lCaseIdx;
  const allCasesDone=ci>=cases.length;
  const done=S.lCompleted.has(idx);

  // Which view: theory or cases
  let content='';

  // Theory section
  content+=`<div class="mb20">${l.body}</div>`;

  // Cases section
  content+=`<div class="case-section">`;
  content+=`<div class="case-tag">📋 Кейсы из практики <span>Из НД: ${l.nd}</span></div>`;

  if(allCasesDone){
    // All cases done
    content+=`<div class="explain" style="margin-bottom:16px"><b>✓ Все ${cases.length} кейса(ов) разобраны!</b> Вы изучили данный раздел.</div>`;
    if(!done){
      content+=`<button class="btn btn-v btn-full btn-lg" onclick="completeLesson(${idx})">Отметить урок как изученный ✓</button>`;
    } else {
      content+=`<div class="learn-complete"><div><div class="fw6 f14 c-success">✓ Урок изучен</div><div class="f12 c-muted mt4">Прогресс сохранён</div></div><button class="btn btn-g btn-sm" onclick="set({scr:'learn',lLesson:-1})">К списку уроков</button></div>`;
    }
  } else {
    const c=cases[ci];
    // Progress dots for cases
    content+=`<div class="flex mb12 g8"><div class="progress-strip">${cases.map((_,i)=>`<div class="ps-dot ${i<ci?'done':i===ci?'on':''}"  style="background:${i<ci?'#10B981':i===ci?'#7C3AED':'#1E293B'};width:8px;height:8px;border-radius:50%"></div>`).join('')}</div><span class="f12 c-muted">Кейс ${ci+1} из ${cases.length}</span></div>`;

    content+=`<div class="card mb12" style="border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.03)"><div class="fw6 f14 mb8" style="color:#FBBF24">${c.q}</div>`;
    // Fragment if exists
    if(c.frag){content+=`<div class="proto mb8">${proto(c.frag)}</div>`}
    content+=`</div>`;

    // Options
    content+=`<div class="col g8 mb12">`;
    content+=c.opts.map((o,i)=>{
      let cls='opt';
      if(S.lCaseFB){
        if(i===c.a)cls+=' ok';
        else if(i===S.lCasePick&&i!==c.a)cls+=' no';
      } else if(i===S.lCasePick) cls+=' sel';
      const mark=S.lCaseFB&&i===c.a?'<span style="margin-left:auto;color:#10B981">✓</span>':(S.lCaseFB&&i===S.lCasePick&&i!==c.a?'<span style="margin-left:auto;color:#EF4444">✗</span>':'');
      return`<button class="${cls}" onclick="${S.lCaseFB?'':'pickLC('+i+')'}" ${S.lCaseFB?'style="cursor:default"':''}><span class="okey">${i+1}</span><span style="flex:1">${o}</span>${mark}</button>`;
    }).join('');
    content+=`</div>`;

    if(S.lCaseFB&&c.exp){
      content+=`<div class="explain mb12"><b>Пояснение:</b> ${c.exp}</div>`;
    }

    content+=`<div class="learn-nav">`;
    if(!S.lCaseFB){
      content+=`<div></div><button class="btn btn-v" ${S.lCasePick===null?'disabled':''} onclick="checkLC()">Проверить ответ →</button>`;
    } else {
      content+=`<div class="f12 c-muted">${ci+1} из ${cases.length}</div><button class="btn btn-v" onclick="nextLC()">
        ${ci<cases.length-1?'Следующий кейс →':'Завершить кейсы →'}
      </button>`;
    }
    content+=`</div>`;
  }
  content+=`</div>`;

  return`<div>
<header class="hdr">
  <button class="btn btn-g btn-sm" onclick="set({scr:'learn',lLesson:-1,lCaseIdx:0,lCasePick:null,lCaseFB:false})">← К урокам</button>
  <div class="flex g8">
    <span class="nd-chip" style="margin-bottom:0">${l.nd}</span>
    ${done?'<span class="badge b-easy">Изучен</span>':''}
  </div>
  <button class="btn btn-g btn-sm" onclick="set({scr:'dash'})">На главную</button>
</header>
<div class="wrap" style="max-width:820px">
  <div class="flex g8 mb16">
    <span style="font-size:22px">${l.icon}</span>
    <div><div class="fw8 f18">${l.title}</div><div class="f12 c-muted mt4">Урок ${idx+1} из ${LESSONS.length}</div></div>
  </div>
  ${content}
  <!-- Nav between lessons -->
  <div class="between mt20" style="padding-top:16px;border-top:1px solid #1E293B">
    ${idx>0?`<button class="btn btn-g btn-sm" onclick="openLesson(${idx-1})">← Урок ${idx}</button>`:'<div></div>'}
    ${idx<LESSONS.length-1?`<button class="btn btn-g btn-sm" onclick="openLesson(${idx+1})">Урок ${idx+2} →</button>`:'<div></div>'}
  </div>
</div></div>`;
}

function sTest(isE){
  const QS=isE?EQ:CQ,qi=isE?S.eQ:S.cQ,pick=isE?S.ePick:S.cPick,fb=isE?S.eFB:S.cFB,ans=isE?S.eAns:S.cAns,q=QS[qi],total=QS.length;
  return`<div class="wrap" style="max-width:700px">
<div class="flex between mb20">
  <button class="btn btn-g btn-sm" onclick="set({scr:'dash'})">← Назад</button>
  <div style="flex:1;margin:0 12px"><div class="flex between mb8"><span class="lbl">${isE?'Входной тест':'Контрольный тест'}</span><span class="mono c-brand fw7">${qi+1}/${total}</span></div><div class="pbar"><div class="pfill" style="width:${Math.round((qi+1)/total*100)}%"></div></div></div>
</div>
<div class="card card-brand mb12"><div class="lbl mb10">Вопрос ${qi+1}</div><div style="font-size:15px;line-height:1.65">${q.t}</div></div>
<div class="col mb16">
${['a','b','c','d'].map(k=>{let cls='opt';if(fb){if(k===q.k)cls+=' ok';else if(k===ans[q.id]&&k!==q.k)cls+=' no';}else if(k===pick)cls+=' sel';const m=fb&&k===q.k?'<span style="margin-left:auto;color:#10B981">✓</span>':(fb&&k===ans[q.id]&&k!==q.k?'<span style="margin-left:auto;color:#EF4444">✗</span>':'');return`<button class="${cls}" onclick="${fb?'':'pickOpt(\''+k+'\','+(isE?1:0)+')'}" ${fb?'style="cursor:default"':''}><span class="okey">${k.toUpperCase()}</span><span style="flex:1">${q[k]}</span>${m}</button>`;}).join('')}
</div>
${fb&&q.x?`<div class="explain mb16"><b>Пояснение:</b> ${q.x}</div>`:''}
<div class="flex" style="justify-content:flex-end">
  ${!fb?`<button class="btn btn-p" ${!pick?'disabled':''} onclick="confirmOpt(${isE?1:0})">Проверить ответ</button>`:`<button class="btn btn-p" onclick="nextQ(${isE?1:0})">${qi<total-1?'Следующий →':'Завершить тест →'}</button>`}
</div></div>`;
}

function sResults(isE){

  return`<div class="wrap" style="max-width:700px">
<div class="card ${passed?'card-success':'card-danger'} ta-c mb20">
  <div style="font-size:60px;font-weight:900;font-family:monospace;line-height:1;color:${passed?'#10B981':'#EF4444'}">${sc}%</div>
  <div class="fw7 f16 mt8 ${passed?'c-success':'c-danger'}">${passed?'✓ Тест пройден':'✗ Не пройден'}</div>
  <div class="c-muted f13 mt8">Правильных: ${correct} из ${QS.length} · Порог: ${thresh}%</div>
  <div class="sgrid mt16">
    <div class="stat"><div class="stat-v c-brand">${correct}</div><div class="stat-l">Верных</div></div>
    <div class="stat"><div class="stat-v c-muted">${QS.length-correct}</div><div class="stat-l">Ошибок</div></div>
    <div class="stat"><div class="stat-v" style="color:${passed?'#10B981':'#EF4444'}">${sc}%</div><div class="stat-l">Результат</div></div>
  </div>
  <div class="flex mt16" style="justify-content:center;flex-wrap:wrap;gap:8px">
    <button class="btn btn-g" onclick="set({scr:'dash'})">На главную</button>
    ${!passed?`<button class="btn btn-p" onclick="${isE?'startEntry()':'startControl()'}">Повторить</button>`:''}
    ${passed&&isE?`<button class="btn btn-p" onclick="startTrainer()">К тренажёру →</button>`:''}
    ${passed&&!isE?`<button class="btn btn-p" onclick="set({scr:'cert'})">Удостоверение →</button>`:''}
  </div>
</div>
<div class="lbl mb12">Разбор ответов</div>
<div class="col g8">
${QS.map((q,i)=>{const ua=ans[q.id],ok=ua===q.k;return`<div class="rev ${ok?'ok':'no'}"><div style="min-width:22px;height:22px;border-radius:50%;background:${ok?'rgba(16,185,129,.15)':'rgba(239,68,68,.12)'};color:${ok?'#10B981':'#EF4444'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${ok?'✓':'✗'}</div><div style="flex:1"><div class="f13 mb4">${i+1}. ${q.t}</div>${!ok?`<div class="f12 mb3" style="color:#FCA5A5">Ваш: ${(ua||'—').toUpperCase()} — ${ua?q[ua]:'не отвечено'}</div>`:''}<div class="f12 c-success">Верно: ${q.k.toUpperCase()} — ${q[q.k]}</div>${q.x?`<div class="f12 c-muted mt4" style="font-style:italic">${q.x}</div>`:''}</div></div>`;}).join('')}
</div></div>`;
}

function sTrainer(){
  if(S.tIdx>=CASES.length){
    return`<div class="center"><div class="card card-success ta-c" style="max-width:400px"><div style="font-size:48px;mb12">🎯</div><div class="fw8 f18 c-success mt12 mb8">Все 20 кейсов решены!</div><div class="f13 c-muted mb20">Вы освоили типовые ошибки в протоколах поверки.</div><button class="btn btn-p btn-full btn-lg" onclick="set({scr:'dash'})">Перейти к контрольному тесту →</button></div></div>`;
  }
  const c=CASES[S.tIdx],res=S.tRes;
  return`<div class="wrap" style="max-width:780px">
<div class="between mb20">
  <button class="btn btn-g btn-sm" onclick="set({scr:'dash'})">← Назад</button>
  <div class="ta-c"><div class="lbl">Тренажёр ошибок</div><div class="f13 c-brand fw6 mt4">Решено: ${S.tSolved.size}/20</div></div>
  <div class="dots">${CASES.map((_,i)=>`<button class="dot" style="background:${S.tSolved.has(i)?'#10B981':i===S.tIdx?'#0D9488':'#1E293B'}" onclick="jumpCase(${i})"></button>`).join('')}</div>
</div>
<div class="card card-brand mb12">
  <div class="between mb12"><div><div class="lbl mb6">Кейс ${S.tIdx+1} из 20</div><div class="fw7 f15">${c.n}</div></div><div class="flex g8">${diffB(c.d)} ${typeB(c.y)}</div></div>
  <div class="lbl mb8">⚠ Фрагмент протокола — найдите ошибку</div>
  <div class="proto">${proto(c.r)}</div>
  ${c.f?`<div class="f11 c-muted mt8">НД: ${c.f}</div>`:''}
</div>
${S.tHint&&!res?`<div class="hintbox mb12"><span style="font-size:14px">💡</span><span>${c.h}</span></div>`:''}
${!res?`
<div class="card mb12"><div class="f13 fw6 c-muted mb12">Выберите описание ошибки:</div><div class="col g8">${c.o.map((o,i)=>`<button class="opt ${S.tPick===i?'sel':''}" onclick="S.tPick=${i};set({})"><span class="okey">${i+1}</span><span>${o}</span></button>`).join('')}</div></div>
<div class="between"><button class="btn btn-g btn-sm" onclick="set({tHint:!S.tHint})">💡 ${S.tHint?'Скрыть подсказку':'Показать подсказку'}</button><button class="btn btn-p" ${S.tPick===null?'disabled':''} onclick="checkCase()">Проверить →</button></div>
`:`
<div class="card ${res.ok?'card-success':'card-danger'} mb12">
  <div class="fw7 f15 mb12 ${res.ok?'c-success':'c-danger'}">${res.ok?'✓ Верно!':'✗ Неверно — правильный ответ:'}</div>
  ${!res.ok?`<div class="f14 mb12">${c.o[c.a]}</div>`:''}
  <div class="explain">${c.e}</div>
</div>
<div style="display:flex;justify-content:flex-end"><button class="btn btn-p" onclick="nextCase()">${S.tIdx<CASES.length-1?'Следующий кейс →':'Завершить тренажёр →'}</button></div>`}
</div>`;
}

    </div>
    <div class="flex" style="justify-content:space-between;border-top:1px solid #1E293B;padding-top:24px;align-items:flex-end">
      <div class="ta-c"><div style="width:120px;height:1px;background:#1E293B;margin:0 auto 8px"></div><div class="f11 c-muted">Руководитель курса</div></div>
      <div class="ta-c"><div style="font-size:32px;color:rgba(16,185,129,.2)">⬡</div><div class="f11 c-muted mono">${cid}</div><div class="f11 c-muted mt4">${ds}</div></div>
      <div class="ta-c"><div style="width:120px;height:1px;background:#1E293B;margin:0 auto 8px"></div><div class="f11 c-muted">Слушатель</div></div>
    </div>
  </div>
</div>
<div class="ta-c f11 c-muted mt12">Учебное удостоверение не заменяет официальную аттестацию поверителя.</div></div>`;
}

// ══════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════
function doLogin(){
  const name=S.lName||'Иванов Иван Иванович';
  set({scr:'dash',user:{name,email:S.lEmail||'student@metrolog.pro',org:S.lOrg||null}});
  toast('Добро пожаловать, '+name.split(' ')[0]+'!');
}
function startEntry(){set({scr:'entry',eQ:0,ePick:null,eFB:false,eAns:{},eDone:false,eScore:null,ePassed:false})}
function startTrainer(){if(!S.ePassed){toast('Сначала пройдите входной тест','err');return}set({scr:'trainer',tIdx:0,tPick:null,tRes:null,tHint:false})}
function startControl(){
  if(!S.ePassed){toast('Сначала пройдите входной тест','err');return}
  if(S.tSolved.size<CASES.length){toast('Завершите тренажёр ('+S.tSolved.size+'/'+CASES.length+')','err');return}
  set({scr:'control',cQ:0,cPick:null,cFB:false,cAns:{},cDone:false,cScore:null,cPassed:false});
}
function pickOpt(k,isE){isE?set({ePick:k}):set({cPick:k})}
function confirmOpt(isE){
  if(isE){const q=EQ[S.eQ];set({eFB:true,eAns:{...S.eAns,[q.id]:S.ePick}})}
  else{const q=CQ[S.cQ];set({cFB:true,cAns:{...S.cAns,[q.id]:S.cPick}})}
}
function nextQ(isE){
  if(isE){
    if(S.eQ<EQ.length-1){set({eQ:S.eQ+1,ePick:null,eFB:false})}
    else{const sc=scoreFn(S.eAns,EQ),p=sc>=60;set({eDone:true,eScore:sc,ePassed:p,scr:'res_e'});if(p)toast('Входной тест пройден! '+sc+'%');else toast('Не пройден: '+sc+'% (нужно ≥60%)','err')}
  } else {
    if(S.cQ<CQ.length-1){set({cQ:S.cQ+1,cPick:null,cFB:false})}
    else{const sc=scoreFn(S.cAns,CQ),p=sc>=80;set({cDone:true,cScore:sc,cPassed:p,scr:'res_c'});if(p)toast('Допуск получен! '+sc+'%');else toast('Не пройден: '+sc+'% (нужно ≥80%)','err')}
  }
}
function checkCase(){
  if(S.tPick===null)return;
  const c=CASES[S.tIdx],ok=S.tPick===c.a;
  if(ok){const ns=new Set(S.tSolved);ns.add(S.tIdx);toast('Верно! +1 кейс ✓');set({tRes:{ok:true},tSolved:ns})}
  else{toast('Неверно — читайте пояснение','err');set({tRes:{ok:false}})}
}
function nextCase(){S.tIdx<CASES.length-1?set({tIdx:S.tIdx+1,tPick:null,tRes:null,tHint:false}):set({tIdx:CASES.length})}
function jumpCase(i){if(!S.tRes)set({tIdx:i,tPick:null,tRes:null,tHint:false})}

// Learning module actions
function openLesson(i){set({lLesson:i,lCaseIdx:0,lCasePick:null,lCaseFB:false})}
function pickLC(i){if(!S.lCaseFB)set({lCasePick:i})}
function checkLC(){if(S.lCasePick===null)return;set({lCaseFB:true})}
function nextLC(){
  const l=LESSONS[S.lLesson],next=S.lCaseIdx+1;
  if(next<l.cases.length){set({lCaseIdx:next,lCasePick:null,lCaseFB:false})}
  else{set({lCaseIdx:next,lCasePick:null,lCaseFB:false})} // allCasesDone view
}
function completeLesson(i){
  const ns=new Set(S.lCompleted);ns.add(i);
  set({lCompleted:ns});
  toast('Урок '+(i+1)+' отмечен как изученный ✓','info');
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function render(){
  const map={
    login:()=>sLogin(),dash:()=>sDash(),
    entry:()=>sTest(true),control:()=>sTest(false),
    res_e:()=>sResults(true),res_c:()=>sResults(false),
    trainer:()=>sTrainer(),cert:()=>sCert(),
    learn:()=>sLearn(),
  };
  document.getElementById('root').innerHTML=(map[S.scr]||map.login)();
}
render();
</script>
</body>
